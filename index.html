<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣早餐點餐</title>
<style>
body{background:#f4f4f4;margin:0;padding:10px;font-family:Arial}
.box{max-width:500px;margin:auto;background:#fff;border-radius:12px;padding:15px}
.item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.item img{width:70px;height:70px;border-radius:8px;margin-right:10px;object-fit:cover}
.info{flex:1}
.name{font-weight:bold}
.vn{font-size:12px;color:#666}
.price{font-weight:bold;color:#c0392b;margin-right:10px}
.num{display:flex;gap:6px}
.num button{width:32px;height:32px;border:none;background:#3498db;color:white;border-radius:50%}
.cart{margin-top:20px;padding:15px;background:#f8f9fa;border-radius:10px}
.total{font-weight:bold;font-size:16px;margin:10px 0}
input,select{width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:6px}
.btn{width:100%;padding:12px;background:#2980b9;color:white;border:none;border-radius:10px;font-weight:bold;margin-top:10px}
</style>
</head>
<body>

<div class="box">
  <h2 style="text-align:center">🍚 台灣小吃點餐</h2>

  <div class="item" data-name="豆漿" data-price="18000">
    < img src="豆漿.jpg">
    <div class="info">
      <div class="name">豆漿</div>
      <div class="vn">Sữa đậu nành</div>
    </div>
    <div class="price">18.000₫</div>
    <div class="num">
      <button onclick="del(this)">-</button>
      <span>0</span>
      <button onclick="add(this)">+</button>
    </div>
  </div>

  <div class="item" data-name="洛神花茶" data-price="22000">
    < img src="洛神花茶.jpg">
    <div class="info">
      <div class="name">洛神花茶</div>
      <div class="vn">Trà hoa lạc thần</div>
    </div>
    <div class="price">22.000₫</div>
    <div class="num">
      <button onclick="del(this)">-</button>
      <span>0</span>
      <button onclick="add(this)">+</button>
    </div>
  </div>

  <div class="cart">
    <div><b>訂單</b></div>
    <div id="list"></div>
    <div class="total">總金額：<span id="total">0</span> ₫</div>

    <input type="text" id="name" placeholder="姓名 / Họ tên">
    <input type="text" id="phone" placeholder="電話 / SĐT">
    <input type="text" id="addr" placeholder="住址 / Địa chỉ">

    <button class="btn" onclick="send()">送出訂單 / Gửi đơn</button>
  </div>
</div>

<script>
let order = {}

function add(el){
  let it = el.closest(".item");
  let name = it.dataset.name;
  let p = Number(it.dataset.price);
  let n = Number(el.previousElementSibling.textContent)+1;
  el.previousElementSibling.textContent = n;
  order[name] = {n:n, p:p};
  up();
}

function del(el){
  let it = el.closest(".item");
  let name = it.dataset.name;
  let n = Math.max(0, Number(el.nextElementSibling.textContent)-1);
  el.nextElementSibling.textContent = n;
  if(n===0) delete order[name];
  else order[name] = {n:n, p:Number(it.dataset.price)};
  up();
}

function up(){
  let list = document.getElementById("list");
  let total = document.getElementById("total");
  list.innerHTML = "";
  let sum = 0;
  for(let k in order){
    let o = order[k];
    let subt = o.n*o.p;
    sum += subt;
    list.innerHTML += k + " ×"+o.n+" = "+subt.toLocaleString()+"₫<br>";
  }
  total.textContent = sum.toLocaleString();
}

// 最穩定、最簡單、一定會有內容的寄信方式
function send(){
  if(Object.keys(order).length === 0){
    alert("請先選商品");
    return;
  }

  let name = document.getElementById("name").value || "無";
  let phone = document.getElementById("phone").value || "無";
  let addr = document.getElementById("addr").value || "無";

  // 直接組成最簡單文字，不搞複雜編碼
  let txt = "新訂單\n";
  txt += "姓名: "+name+"\n";
  txt += "電話: "+phone+"\n";
  txt += "住址: "+addr+"\n\n";
  txt += "點餐:\n";

  let total = 0;
  for(let k in order){
    let o = order[k];
    let subt = o.n*o.p;
    total += subt;
    txt += k + " ×"+o.n+" = "+subt.toLocaleString()+"₫\n";
  }
  txt += "\n總金額: "+total.toLocaleString()+"₫";

  // 最簡單 mailto，Gmail 一定吃得到
  let url = "mailto:big177tw@gmail.com?subject=新訂單&body=" + encodeURIComponent(txt);
  window.open(url);
  alert("已開啟郵件，請按傳送");
}
</script>
</body>
</html>
