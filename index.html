<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣小吃點餐</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體,sans-serif}
body{background:#f8f5f0;padding:20px;padding-bottom:120px}
.container{max-width:600px;margin:0 auto}
.category{background:#fff;border-radius:10px;padding:15px;margin-bottom:15px}
.category-title{font-size:17px;font-weight:bold;margin-bottom:10px;border-left:4px solid #c41e3a;padding-left:8px}
.item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.item-info{flex:1}
.item-price{color:#c41e3a;font-weight:bold}
.item-ctrl{display:flex;gap:8px;align-items:center}
.item-ctrl button{width:30px;height:30px;border-radius:50%;border:none;background:#f1f1f1}
.footer{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:15px;box-shadow:0 -2px 5px rgba(0,0,0,0.1)}
.total-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:16px}
.checkout-btn{width:100%;padding:12px;background:#c41e3a;color:white;border:none;border-radius:8px;font-size:16px;font-weight:bold}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center}
.modal-content{background:#fff;padding:25px;border-radius:10px;width:90%;max-width:350px}
.modal input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px}
.modal-btn{margin-top:10px;padding:10px;width:100%;background:#c41e3a;color:white;border:none;border-radius:6px}
.pay-type{display:flex;gap:10px;margin:10px 0}
.pay-type button{flex:1;padding:8px;border:1px solid #c41e3a;background:#fff;border-radius:6px}
.pay-type button.active{background:#c41e3a;color:#fff}
</style>
</head>
<body>

<div class="container">
  <h2 style="text-align:center; margin-bottom:15px">台灣小吃點餐</h2>

  <div style="display:flex;gap:8px;margin-bottom:15px">
    <button onclick="setType(this,'內用')" class="active">內用</button>
    <button onclick="setType(this,'自取')">自取</button>
    <button onclick="setType(this,'外送')">外送</button>
  </div>

  <!-- 早餐 -->
  <div class="category">
    <div class="category-title">早餐</div>
    <div class="item" data-price="45000">
      <div class="item-info"><div>蛋餅</div><div style="font-size:12px;color:#666">Bánh trứng rán</div></div>
      <div class="item-price">45.000₫</div>
      <div class="item-ctrl">
        <button onclick="cut(this)">-</button>
        <span>0</span>
        <button onclick="add(this)">+</button>
      </div>
    </div>
    <div class="item" data-price="50000">
      <div class="item-info"><div>飯糰</div><div style="font-size:12px;color:#666">Cơm nắm</div></div>
      <div class="item-price">50.000₫</div>
      <div class="item-ctrl">
        <button onclick="cut(this)">-</button>
        <span>0</span>
        <button onclick="add(this)">+</button>
      </div>
    </div>
  </div>

  <!-- 午餐 -->
  <div class="category">
    <div class="category-title">午餐</div>
    <div class="item" data-price="65000">
      <div class="item-info"><div>燒肉飯</div></div>
      <div class="item-price">65.000₫</div>
      <div class="item-ctrl">
        <button onclick="cut(this)">-</button>
        <span>0</span>
        <button onclick="add(this)">+</button>
      </div>
    </div>
    <div class="item" data-price="60000">
      <div class="item-info"><div>滷肉飯</div></div>
      <div class="item-price">60.000₫</div>
      <div class="item-ctrl">
        <button onclick="cut(this)">-</button>
        <span>0</span>
        <button onclick="add(this)">+</button>
      </div>
    </div>
  </div>

  <!-- 炸類 -->
  <div class="category">
    <div class="category-title">炸類</div>
    <div class="item" data-price="80000">
      <div class="item-info"><div>鹹酥雞</div></div>
      <div class="item-price">80.000₫</div>
      <div class="item-ctrl">
        <button onclick="cut(this)">-</button>
        <span>0</span>
        <button onclick="add(this)">+</button>
      </div>
    </div>
  </div>

  <!-- 湯品 -->
  <div class="category">
    <div class="category-title">湯品</div>
    <div class="item" data-price="35000">
      <div class="item-info"><div>季節湯</div></div>
      <div class="item-price">35.000₫</div>
      <div class="item-ctrl">
        <button onclick="cut(this)">-</button>
        <span>0</span>
        <button onclick="add(this)">+</button>
      </div>
    </div>
  </div>

  <!-- 飲料 -->
  <div class="category">
    <div class="category-title">飲料</div>
    <div class="item" data-price="15000">
      <div class="item-info"><div>豆漿</div></div>
      <div class="item-price">15.000₫</div>
      <div class="item-ctrl">
        <button onclick="cut(this)">-</button>
        <span>0</span>
        <button onclick="add(this)">+</button>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="total-row">
    <div>合計：</div>
    <div id="total" style="font-weight:bold;color:#c41e3a">0₫</div>
  </div>
  <button class="checkout-btn" onclick="checkout()">結帳</button>
</div>

<!-- 外送表單 -->
<div class="modal" id="deliveryModal">
  <div class="modal-content">
    <h3>外送資訊</h3>
    <input id="addr" placeholder="住址">
    <input id="tel" placeholder="電話">
    <button class="modal-btn" onclick="sendDelivery()">確認</button>
  </div>
</div>

<!-- 支付 -->
<div class="modal" id="payModal">
  <div class="modal-content">
    <h3>支付方式</h3>
    <div class="pay-type">
      <button onclick="setPay(this,'現金')">現金</button>
      <button onclick="setPay(this,'貨到付款')">貨到付款</button>
    </div>
    <button class="modal-btn" onclick="sendOrder()">確認下單</button>
  </div>
</div>

<!-- 成功 -->
<div class="modal" id="okModal">
  <div class="modal-content">
    <h3>下單成功</h3>
    <div id="okText"></div>
    <button class="modal-btn" onclick="closeAll()">確認</button>
  </div>
</div>

<script>
let type = "內用";
let pay = "";
let orderId = 1;
let addr = "";
let tel = "";

function setType(el,t){
  document.querySelectorAll(".footer + div button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  type = t;
}

function add(el){
  let num = el.previousElementSibling;
  num.textContent = parseInt(num.textContent)+1;
  cal();
}
function cut(el){
  let num = el.nextElementSibling;
  if(num.textContent>0) num.textContent = parseInt(num.textContent)-1;
  cal();
}

function cal(){
  let total = 0;
  document.querySelectorAll(".item").forEach(it=>{
    let p = parseInt(it.dataset.price);
    let c = parseInt(it.querySelector("span").textContent);
    total += p*c;
  });
  document.getElementById("total").textContent = total.toLocaleString('vi-VN') + "₫";
}

function checkout(){
  let t = document.getElementById("total").textContent.replace(/\D/g,"");
  if(t==0){alert("請先選商品");return;}
  if(type=="外送"){
    document.getElementById("deliveryModal").style.display="flex";
    return;
  }
  openPay();
}

function sendDelivery(){
  addr = document.getElementById("addr").value.trim();
  tel = document.getElementById("tel").value.trim();
  if(!addr || !tel){alert("請填住址與電話");return;}
  document.getElementById("deliveryModal").style.display="none";
  openPay();
}

function openPay(){
  pay = "";
  document.querySelectorAll(".pay-type button").forEach(b=>b.classList.remove("active"));
  document.getElementById("payModal").style.display="flex";
}

function setPay(el,t){
  document.querySelectorAll(".pay-type button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  pay = t;
}

// 這裡就是「下單傳送後台」，我已經寫好，你不用動
function sendOrder(){
  if(!pay){alert("請選支付方式");return;}
  document.getElementById("payModal").style.display="none";

  let items = [];
  document.querySelectorAll(".item").forEach(it=>{
    let name = it.querySelector(".item-info div").textContent;
    let price = parseInt(it.dataset.price);
    let qty = parseInt(it.querySelector(".item-ctrl span").textContent);
    if(qty>0) items.push({name,price,qty});
  });

  let total = parseInt(document.getElementById("total").textContent.replace(/\D/g,""));

  let order = {
    orderId: orderId,
    type: type,
    pay: pay,
    addr: addr,
    tel: tel,
    total: total,
    items: items
  };

  // 傳給後台
  fetch("get_orders.php",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(order)
  });

  // 顯示成功
  let msg = `訂單#${orderId}\n類型：${type}\n支付：${pay}`;
  if(type=="外送") msg += `\n住址：${addr}\n電話：${tel}`;
  msg += `\n金額：${total.toLocaleString('vi-VN')}₫`;
  document.getElementById("okText").textContent = msg;
  document.getElementById("okModal").style.display="flex";

  // 清空
  orderId++;
  addr = ""; tel = "";
  document.querySelectorAll(".item span").forEach(s=>s.textContent=0);
  cal();
}

function closeAll(){
  document.getElementById("okModal").style.display="none";
}
</script>

</body>
</html>
