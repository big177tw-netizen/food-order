<!DOCTYPE html>
<html lang="zh-TW">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt hàng - Đồ ăn Đài Loan</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:12px;background:#f4f6f8;font-family:Arial}
.box{max-width:500px;margin:auto;background:#fff;border-radius:16px;padding:20px}
.title{text-align:center;font-size:22px;font-weight:bold;margin-bottom:16px}
.cate{font-weight:bold;color:#e63946;margin:20px 0 8px;font-size:16px}
.item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.info{flex:1}
.name{font-weight:bold}
.vn{font-size:13px;color:#666}
.price{font-weight:bold;color:#e63946;width:80px;text-align:right}
.ctrl{display:flex;align-items:center;gap:8px}
.ctrl button{width:32px;height:32px;border:none;background:#0096c7;color:white;border-radius:50%}
.ctrl span{min-width:24px;text-align:center;font-weight:bold}
.cart{margin-top:24px;padding:16px;background:#f8f9fa;border-radius:12px}
.total{font-size:17px;font-weight:bold;color:#e63946;margin:10px 0}
input,select{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px}
.btn{width:100%;padding:14px;background:#2563eb;color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;margin-top:10px}
</style>

<div class="box">
  <div class="title">🍚 Đồ ăn Đài Loan</div>

  <div class="cate">Món chính</div>

  <div class="item" data-name="蛋餅" data-price="30000">
    <div class="info">
      <div class="name">蛋餅</div>
      <div class="vn">Bánh trứng</div>
    </div>
    <div class="price">30.000₫</div>
    <div class="ctrl">
      <button onclick="del(this)">-</button>
      <span>0</span>
      <button onclick="add(this)">+</button>
    </div>
  </div>

  <div class="item" data-name="飯糰" data-price="25000">
    <div class="info">
      <div class="name">飯糰</div>
      <div class="vn">Cơm cuộn</div>
    </div>
    <div class="price">25.000₫</div>
    <div class="ctrl">
      <button onclick="del(this)">-</button>
      <span>0</span>
      <button onclick="add(this)">+</button>
    </div>
  </div>

  <div class="item" data-name="滷肉飯" data-price="40000">
    <div class="info">
      <div class="name">滷肉飯</div>
      <div class="vn">Cơm thịt kho</div>
    </div>
    <div class="price">40.000₫</div>
    <div class="ctrl">
      <button onclick="del(this)">-</button>
      <span>0</span>
      <button onclick="add(this)">+</button>
    </div>
  </div>

  <div class="cate">Món chiên</div>

  <div class="item" data-name="鹹酥雞" data-price="35000">
    <div class="info">
      <div class="name">鹹酥雞</div>
      <div class="vn">Gà rán muối</div>
    </div>
    <div class="price">35.000₫</div>
    <div class="ctrl">
      <button onclick="del(this)">-</button>
      <span>0</span>
      <button onclick="add(this)">+</button>
    </div>
  </div>

  <div class="cate">Đồ uống</div>

  <div class="item" data-name="豆漿" data-price="18000">
    <div class="info">
      <div class="name">豆漿</div>
      <div class="vn">Sữa đậu nành</div>
    </div>
    <div class="price">18.000₫</div>
    <div class="ctrl">
      <button onclick="del(this)">-</button>
      <span>0</span>
      <button onclick="add(this)">+</button>
    </div>
  </div>

  <div class="cart">
    <div><b>🛒 Đơn hàng</b></div>
    <div id="list"></div>
    <div class="total">Tổng: <span id="total">0</span> ₫</div>

    Họ tên:<br>
    <input type="text" id="name" placeholder="Nhập họ tên"><br>

    Số điện thoại:<br>
    <input type="text" id="phone" placeholder="Nhập số điện thoại"><br>

    Địa chỉ:<br>
    <input type="text" id="addr" placeholder="Nhập địa chỉ"><br>

    Thanh toán:<br>
    <select id="pay">
      <option>Tiền mặt</option>
      <option>Chuyển khoản</option>
    </select><br>

    Nhận hàng:<br>
    <select id="pick">
      <option>Tự lấy</option>
      <option>Giao hàng</option>
    </select><br>

    <button class="btn" onclick="sendOrder()">GỬI ĐƠN HÀNG</button>
  </div>
</div>

<script>
let order = {}

// 👉 這裡我已經幫你換成「正確Telegram版本網址」
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwwsxZaYSudpYvopcwCg-B0DtnUu33MgXkvXCSLEtJ0jgx2FDb1ocIbhyMujqmfhYck/exec";

function add(el) {
  let i = el.closest(".item");
  let name = i.dataset.name;
  let price = +i.dataset.price;
  let num = el.previousElementSibling;
  let n = +num.textContent + 1;
  num.textContent = n;
  order[name] = { n, p: price };
  update();
}

function del(el) {
  let i = el.closest(".item");
  let name = i.dataset.name;
  let num = el.nextElementSibling;
  let n = Math.max(0, +num.textContent - 1);
  num.textContent = n;
  if (n === 0) delete order[name];
  else order[name] = { n, p: +i.dataset.price };
  update();
}

function update() {
  let list = document.getElementById("list");
  let total = document.getElementById("total");
  list.innerHTML = "";
  let sum = 0;
  for (let k in order) {
    let it = order[k];
    let subt = it.n * it.p;
    sum += subt;
    list.innerHTML += `<div>${k} × ${it.n} = ${subt.toLocaleString()}₫</div>`;
  }
  total.textContent = sum.toLocaleString();
}

async function sendOrder() {
  if (Object.keys(order).length === 0) {
    alert("Vui lòng chọn món!");
    return;
  }

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let addr = document.getElementById("addr").value.trim();
  let pay = document.getElementById("pay").value;
  let pick = document.getElementById("pick").value;

  let text = "";
  let total = 0;
  for (let k in order) {
    let it = order[k];
    let subt = it.n * it.p;
    total += subt;
    text += k + "×" + it.n + " ";
  }

  try {
    await fetch(GOOGLE_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        name: name,
        phone: phone,
        addr: addr,
        pay: pay,
        pickup: pick,
        text: text,
        total: total
      }),
      headers: { "Content-Type": "application/json" }
    });

    alert("✅ Gửi đơn thành công!\nCảm ơn bạn!");
    order = {};
    document.querySelectorAll(".ctrl span").forEach(s => s.textContent = 0);
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("addr").value = "";
    update();
  } catch (e) {
    alert("❌ Lỗi mạng, vui lòng thử lại!");
  }
}
</script>
</html>
